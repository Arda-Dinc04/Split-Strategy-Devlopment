name: Nightly Split Collector

on:
  schedule:
    - cron: "45 4 * * *" # 04:45 UTC (11:45 PM EST previous day)
  workflow_dispatch: # Allow manual triggering from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock split collector (web scraping)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
          MONGODB_COLLECTION: ${{ secrets.MONGODB_COLLECTION }}
        run: |
          python -m split_strategy.scrapers.runner
      
      - name: Run EDGAR batch processor
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
          SEC_USER_AGENT: "Split Strategy Analysis contact@splitstrategy.com"
        run: |
          python scripts/nightly_job.py
      
      - name: Run Early Edgar Scanner (daily)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/scan_early_edgar.py

      - name: Run Split Metrics Updater
        run: |
          python scripts/update_split_metrics.py

      - name: Commit and push tracking CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DATA/split_performance.csv
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily split tracking" && git push)
